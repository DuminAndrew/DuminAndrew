<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 60" width="1200" height="60">
  <defs>
    <linearGradient id="lineGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00a8ff" stop-opacity="0"/>
      <stop offset="0.2" stop-color="#00a8ff" stop-opacity="0.6"/>
      <stop offset="0.5" stop-color="#bb9af7" stop-opacity="0.9"/>
      <stop offset="0.8" stop-color="#ff6b35" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#ff6b35" stop-opacity="0"/>
      <animate attributeName="x1" values="0;1;0" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="1;2;1" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="fadeMask" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="white" stop-opacity="0"/>
      <stop offset="0.15" stop-color="white" stop-opacity="1"/>
      <stop offset="0.85" stop-color="white" stop-opacity="1"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="edgeFade">
      <rect width="1200" height="60" fill="url(#fadeMask)"/>
    </mask>
    <radialGradient id="dot">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#00a8ff"/>
      <stop offset="1" stop-color="#00a8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="1.5"/></filter>
  </defs>

  <g mask="url(#edgeFade)">
    <line x1="0" y1="30" x2="1200" y2="30" stroke="url(#lineGrad)" stroke-width="1.5"/>

    <circle cy="30" r="2.5" fill="url(#dot)" filter="url(#blur)">
      <animate attributeName="cx" from="-20" to="1220" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cy="30" r="2" fill="#bb9af7" filter="url(#blur)">
      <animate attributeName="cx" from="1220" to="-20" dur="7s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cy="30" r="2.5" fill="#ff6b35" filter="url(#blur)">
      <animate attributeName="cx" from="-20" to="1220" dur="6s" begin="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cy="30" r="1.5" fill="#41cd52" filter="url(#blur)">
      <animate attributeName="cx" from="1220" to="-20" dur="8s" begin="3.5s" repeatCount="indefinite"/>
    </circle>

    <circle cx="600" cy="30" r="4" fill="#00a8ff" filter="url(#blur)">
      <animate attributeName="r" values="3;7;3" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.4;1" dur="3s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
