<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="space" cx="0.5" cy="0.5" r="0.8">
      <stop offset="0" stop-color="#1a1f3a"/>
      <stop offset="0.5" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#00a8ff">
        <animate attributeName="stop-color" values="#00a8ff;#bb9af7;#ff6b35;#41cd52;#00a8ff" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="0.5" stop-color="#bb9af7">
        <animate attributeName="stop-color" values="#bb9af7;#ff6b35;#41cd52;#00a8ff;#bb9af7" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="1" stop-color="#ff6b35">
        <animate attributeName="stop-color" values="#ff6b35;#41cd52;#00a8ff;#bb9af7;#ff6b35" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="coreGlow">
      <stop offset="0" stop-color="#00a8ff" stop-opacity="1"/>
      <stop offset="0.5" stop-color="#00a8ff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#00a8ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="particleGrad">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.3" stop-color="#00a8ff"/>
      <stop offset="1" stop-color="#00a8ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .matrix { font: 700 14px 'Fira Code', monospace; fill: #41cd52; opacity: 0.6; }
      .title  { font: 800 64px 'Segoe UI', 'Fira Code', sans-serif; }
      .sub    { font: 500 18px 'Fira Code', monospace; fill: #c9d1d9; letter-spacing: 4px; }
      .tech   { font: 700 12px 'Fira Code', monospace; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1200" height="400" fill="url(#space)" rx="16"/>

  <g>
    <path d="M 0 50 L 1200 50 M 0 100 L 1200 100 M 0 150 L 1200 150 M 0 200 L 1200 200 M 0 250 L 1200 250 M 0 300 L 1200 300 M 0 350 L 1200 350" stroke="#00a8ff" stroke-width="0.5" opacity="0.08"/>
    <path d="M 100 0 L 100 400 M 200 0 L 200 400 M 300 0 L 300 400 M 400 0 L 400 400 M 500 0 L 500 400 M 600 0 L 600 400 M 700 0 L 700 400 M 800 0 L 800 400 M 900 0 L 900 400 M 1000 0 L 1000 400 M 1100 0 L 1100 400" stroke="#00a8ff" stroke-width="0.5" opacity="0.08"/>
  </g>

  <g opacity="0.35">
    <text x="40" y="-20" class="matrix">
      0<tspan x="40" dy="20">1</tspan><tspan x="40" dy="20">0</tspan><tspan x="40" dy="20">1</tspan><tspan x="40" dy="20">1</tspan><tspan x="40" dy="20">0</tspan><tspan x="40" dy="20">&gt;</tspan><tspan x="40" dy="20">&#60;</tspan><tspan x="40" dy="20">/</tspan><tspan x="40" dy="20">*</tspan><tspan x="40" dy="20">1</tspan><tspan x="40" dy="20">0</tspan>
      <animate attributeName="y" from="-240" to="400" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="80" y="-20" class="matrix">
      1<tspan x="80" dy="20">0</tspan><tspan x="80" dy="20">1</tspan><tspan x="80" dy="20">1</tspan><tspan x="80" dy="20">0</tspan><tspan x="80" dy="20">0</tspan><tspan x="80" dy="20">1</tspan><tspan x="80" dy="20">+</tspan><tspan x="80" dy="20">+</tspan><tspan x="80" dy="20">0</tspan>
      <animate attributeName="y" from="-200" to="400" dur="8s" begin="1s" repeatCount="indefinite"/>
    </text>
    <text x="1100" y="-20" class="matrix">
      &lt;<tspan x="1100" dy="20">/</tspan><tspan x="1100" dy="20">&gt;</tspan><tspan x="1100" dy="20">0</tspan><tspan x="1100" dy="20">1</tspan><tspan x="1100" dy="20">0</tspan><tspan x="1100" dy="20">1</tspan><tspan x="1100" dy="20">1</tspan><tspan x="1100" dy="20">0</tspan>
      <animate attributeName="y" from="-200" to="400" dur="7s" begin="0.5s" repeatCount="indefinite"/>
    </text>
    <text x="1140" y="-20" class="matrix">
      *<tspan x="1140" dy="20">/</tspan><tspan x="1140" dy="20">1</tspan><tspan x="1140" dy="20">0</tspan><tspan x="1140" dy="20">1</tspan><tspan x="1140" dy="20">0</tspan><tspan x="1140" dy="20">1</tspan><tspan x="1140" dy="20">1</tspan>
      <animate attributeName="y" from="-240" to="400" dur="9s" begin="2s" repeatCount="indefinite"/>
    </text>
    <text x="160" y="-20" class="matrix">
      #<tspan x="160" dy="20">i</tspan><tspan x="160" dy="20">n</tspan><tspan x="160" dy="20">c</tspan><tspan x="160" dy="20">l</tspan><tspan x="160" dy="20">u</tspan><tspan x="160" dy="20">d</tspan><tspan x="160" dy="20">e</tspan>
      <animate attributeName="y" from="-200" to="400" dur="10s" begin="3s" repeatCount="indefinite"/>
    </text>
    <text x="1020" y="-20" class="matrix">
      c<tspan x="1020" dy="20">o</tspan><tspan x="1020" dy="20">n</tspan><tspan x="1020" dy="20">s</tspan><tspan x="1020" dy="20">t</tspan><tspan x="1020" dy="20">e</tspan><tspan x="1020" dy="20">x</tspan><tspan x="1020" dy="20">p</tspan>
      <animate attributeName="y" from="-240" to="400" dur="11s" begin="2.5s" repeatCount="indefinite"/>
    </text>
  </g>

  <circle cx="600" cy="200" r="140" fill="url(#coreGlow)">
    <animate attributeName="r" values="140;180;140" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="4s" repeatCount="indefinite"/>
  </circle>

  <g transform="translate(600, 200)">
    <ellipse rx="260" ry="90" fill="none" stroke="#00a8ff" stroke-width="1" opacity="0.25" stroke-dasharray="4 6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="200" ry="70" fill="none" stroke="#bb9af7" stroke-width="1" opacity="0.25" stroke-dasharray="3 5">
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="30s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse rx="140" ry="50" fill="none" stroke="#ff6b35" stroke-width="1" opacity="0.25" stroke-dasharray="2 4">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <g transform="translate(600, 200)">
    <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="25s" repeatCount="indefinite" additive="sum"/>
    <g transform="translate(0, 0) rotate(0)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#00599C" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#00a8ff">C++</text>
        <animateTransform attributeName="transform" type="rotate" from="0" to="-360" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(60)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#41CD52" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#41cd52">Qt</text>
        <animateTransform attributeName="transform" type="rotate" from="-60" to="-420" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(120)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#5C3EE8" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#bb9af7">CV</text>
        <animateTransform attributeName="transform" type="rotate" from="-120" to="-480" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(180)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#157F2D" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#41cd52">B++</text>
        <animateTransform attributeName="transform" type="rotate" from="-180" to="-540" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(240)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#F05032" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#ff6b35">Git</text>
        <animateTransform attributeName="transform" type="rotate" from="-240" to="-600" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(300)">
      <g transform="translate(-260, 0)">
        <circle r="18" fill="#161b22" stroke="#064F8C" stroke-width="2" filter="url(#glow)"/>
        <text y="5" text-anchor="middle" class="tech" fill="#7dcfff">CM</text>
        <animateTransform attributeName="transform" type="rotate" from="-300" to="-660" dur="25s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
  </g>

  <g transform="translate(600, 200)">
    <animateTransform attributeName="transform" type="rotate" from="360 0 0" to="0 0 0" dur="15s" repeatCount="indefinite" additive="sum"/>
    <g transform="rotate(0)">
      <g transform="translate(-140, 0)">
        <circle r="12" fill="#ff6b35" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="15s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(120)">
      <g transform="translate(-140, 0)">
        <circle r="12" fill="#bb9af7" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate" from="-120" to="240" dur="15s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
    <g transform="rotate(240)">
      <g transform="translate(-140, 0)">
        <circle r="12" fill="#41cd52" filter="url(#glow)"/>
        <animateTransform attributeName="transform" type="rotate" from="-240" to="120" dur="15s" repeatCount="indefinite" additive="sum"/>
      </g>
    </g>
  </g>

  <circle cx="600" cy="200" r="28" fill="#0d1117" stroke="url(#titleGrad)" stroke-width="3" filter="url(#bigglow)">
    <animate attributeName="r" values="28;36;28" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="600" y="208" text-anchor="middle" font-size="28" font-weight="700" fill="url(#titleGrad)">&lt;/&gt;</text>

  <text x="600" y="90" text-anchor="middle" class="title" fill="url(#titleGrad)" filter="url(#glow)">
    ANDREW  DUMIN
    <animate attributeName="opacity" values="0.8;1;0.8" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="125" text-anchor="middle" class="sub">
    C++  •  SYSTEMS  •  HIGH-PERFORMANCE
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
  </text>

  <text x="600" y="350" text-anchor="middle" class="sub" font-size="14" fill="#00a8ff" letter-spacing="8">
    [ BUILDING · THE · FUTURE · IN · C++ ]
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/>
  </text>

  <g transform="translate(600, 375)">
    <circle cx="-60" r="3" fill="#00a8ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="-30" r="3" fill="#00a8ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="0" r="3" fill="#00a8ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" r="3" fill="#00a8ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="60" r="3" fill="#00a8ff">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g>
    <circle r="2" fill="url(#particleGrad)">
      <animateMotion dur="8s" repeatCount="indefinite" path="M 100 350 Q 300 100 500 200 T 900 150 T 1100 300"/>
    </circle>
    <circle r="2" fill="url(#particleGrad)">
      <animateMotion dur="10s" begin="2s" repeatCount="indefinite" path="M 1100 100 Q 800 300 500 150 T 100 250"/>
    </circle>
    <circle r="2" fill="url(#particleGrad)">
      <animateMotion dur="12s" begin="4s" repeatCount="indefinite" path="M 200 50 Q 500 350 800 100 T 1150 250"/>
    </circle>
    <circle r="1.5" fill="#bb9af7">
      <animateMotion dur="9s" begin="1s" repeatCount="indefinite" path="M 50 200 Q 400 50 700 300 T 1150 100"/>
    </circle>
    <circle r="1.5" fill="#ff6b35">
      <animateMotion dur="11s" begin="3s" repeatCount="indefinite" path="M 1150 300 Q 700 50 300 250 T 50 100"/>
    </circle>
  </g>
</svg>
